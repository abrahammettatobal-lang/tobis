# fly launch --name tobis-backend --region dfw --no-deploy
# fly secrets set RAPIDAPI_KEY=... SPORTSAPI_KEY=... GEMINI_API_KEY=... FRONTEND_URL=https://tobis-two.vercel.app

app = 'tobis-backend'
primary_region = 'dfw'

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    grace_period = '30s'
    interval = '30s'
    method = 'GET'
    path = '/api/health'
    port = 3001
    timeout = '5s'
    type = 'http'
