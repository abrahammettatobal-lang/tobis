# fly launch --name tobis-streamer --region dfw --no-deploy
# fly secrets set FRONTEND_URL=https://tobis-two.vercel.app

app = 'tobis-streamer'
primary_region = 'dfw'

[build]

[http_service]
  internal_port = 8091
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    grace_period = '60s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    port = 8091
    timeout = '10s'
    type = 'http'
