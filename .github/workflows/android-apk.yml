name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/android-apk.yml'

jobs:
  apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app and sync Capacitor
        run: npm run build:app

      - name: Generate launcher icons and splash
        run: npm run cap:assets

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon -q

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tobis-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: APK summary
        run: |
          ls -lh android/app/build/outputs/apk/debug/
          echo "Descarga el APK desde Actions → Artifacts → tobis-debug-apk"
